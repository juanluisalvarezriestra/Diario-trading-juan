<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diario de Trading</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;background:#0b1320;color:white;margin:0;padding:20px}
h1{margin-top:0}
input,select,textarea,button{padding:8px;margin:4px;border-radius:6px;border:none}
button{cursor:pointer}
.panel{background:#14223a;padding:15px;border-radius:10px;margin-bottom:15px}
.trade{background:#0f1a2f;padding:10px;border-radius:8px;margin-bottom:8px}
.trade button{margin-left:5px}
.link{color:#6fb3ff;text-decoration:underline;cursor:pointer}
</style>
</head>

<body>

<h1>Diario de Trading</h1>

<div class="panel">
<h3>Nueva operación</h3>

Instrumento<br>
<input id="instrumento"><br>

Dirección<br>
<select id="direccion">
<option>Largo</option>
<option>Corto</option>
</select><br>

Precio de entrada (por acción)<br>
<input id="entrada" type="number" step="0.0001"><br>

Precio de venta (por acción, opcional si sigue abierta)<br>
<input id="salida" type="number" step="0.0001"><br>

Cantidad de acciones<br>
<input id="cantidad" type="number" step="0.0001"><br>

Capital invertido (opcional si usas cantidad)<br>
<input id="capital" type="number" step="0.01"><br>

Notas<br>
<textarea id="notas"></textarea><br>

<button onclick="guardar()">Guardar operación</button>
</div>


<div class="panel">
<h3>Historial</h3>
<div id="historial"></div>
</div>


<script>

const KEY="trading_diary_v1"

let trades=JSON.parse(localStorage.getItem(KEY)||"[]")

function save(){
localStorage.setItem(KEY,JSON.stringify(trades))
render()
}

function guardar(){

let t={
id:Date.now(),
instrumento:document.getElementById("instrumento").value.toUpperCase(),
direccion:document.getElementById("direccion").value,
entrada:parseFloat(document.getElementById("entrada").value),
salida:parseFloat(document.getElementById("salida").value)||null,
cantidad:parseFloat(document.getElementById("cantidad").value)||null,
capital:parseFloat(document.getElementById("capital").value)||null,
notas:document.getElementById("notas").value
}

if(!t.instrumento||!t.entrada){
alert("Instrumento y precio de entrada son obligatorios")
return
}

if(!t.cantidad && t.capital){
t.cantidad=t.capital/t.entrada
}

trades.unshift(t)
save()
limpiar()
}

function limpiar(){
document.querySelectorAll("input,textarea").forEach(e=>e.value="")
}

function borrar(id){
if(confirm("¿Borrar operación?")){
trades=trades.filter(t=>t.id!=id)
save()
}
}

function cerrar(id){
let precio=prompt("Precio de venta por acción")
if(!precio)return

let t=trades.find(x=>x.id==id)
t.salida=parseFloat(precio)

save()
}

function editar(id){

let t=trades.find(x=>x.id==id)

let nuevaEntrada=prompt("Precio entrada",t.entrada)
if(nuevaEntrada) t.entrada=parseFloat(nuevaEntrada)

let nuevaCantidad=prompt("Cantidad",t.cantidad)
if(nuevaCantidad) t.cantidad=parseFloat(nuevaCantidad)

save()
}

function resultado(t){

if(!t.salida)return null

let qty=t.cantidad||0

if(t.direccion=="Largo")
return (t.salida-t.entrada)*qty
else
return (t.entrada-t.salida)*qty
}

function abrirInstrumento(sym){

let url="https://www.tradingview.com/symbols/"+sym+"/"
window.open(url,"_blank")

}

function render(){

let box=document.getElementById("historial")

if(!trades.length){
box.innerHTML="No hay operaciones"
return
}

box.innerHTML=trades.map(t=>{

let r=resultado(t)

return `
<div class="trade">

<b class="link" onclick="abrirInstrumento('${t.instrumento}')">
${t.instrumento}
</b>

${t.direccion} |
entrada ${t.entrada}

${t.salida?("| salida "+t.salida):"| abierta"}

| qty ${t.cantidad?.toFixed(2)||"-"}

${r!=null?("| resultado "+r.toFixed(2)):""}

<br>

<button onclick="cerrar(${t.id})">Cerrar</button>
<button onclick="editar(${t.id})">Editar</button>
<button onclick="borrar(${t.id})">Borrar</button>

</div>
`

}).join("")

}

render()

</script>

</body>
</html>
